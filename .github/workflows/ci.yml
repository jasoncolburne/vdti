name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint-terminology:
    name: Lint Terminology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint-terminology

  # Code-dependent jobs are commented out until the Cargo workspace lands in
  # Phase 1. Uncomment and adapt as each becomes meaningful. The conditional
  # `hashFiles('Cargo.toml') != ''` gate isn't supported at job level
  # (validator: "Unrecognized function: 'hashFiles'") — when re-enabling,
  # either gate on a `check-workspace` job + `needs: / if:` outputs pattern,
